name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: e2e k8s-${{ matrix.k8s }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Continue tests matrix if a flaky run occurs.
      matrix:
        k8s:
          - 1.32
          - 1.33
          - 1.34
          - 1.35

    permissions:
      id-token: write

    env:
      KUBERNETES_VERSION: ${{ matrix.k8s }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: hetznercloud/tps-action@dc6d67c5768ca43b840429b6c7409cda61cf4092 # main

      - name: Install test tools
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Setup tests
        run: make e2e-setup

      - name: Run tests
        run: make e2e-coverage

      - name: upload coverage reports to codecov
        if: >
          !startswith(github.head_ref, 'renovate/') &&
          !startswith(github.head_ref, 'releaser-pleaser--')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.codecov_token }}
